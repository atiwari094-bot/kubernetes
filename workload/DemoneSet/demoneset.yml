apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-daemon
  namespace: ashish
spec:
  selector:
    matchLabels:
      app: nginx-daemon
  template:
    metadata:
      labels:
        app: nginx-daemon
    spec:
      containers:
        - name: nginx-daemon
          image: nginx:latest
          ports:
            - containerPort: 80
